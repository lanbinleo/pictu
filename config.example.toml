[server]
host = "0.0.0.0"
port = 8080
frontend_dist = "web/dist"
jwt_secret = "change-me-before-production"

[database]
path = "pictu.db"

[storage]
generated_dir = "generated"
public_prefix = "/generated"

# Runtime settings such as LLM providers, upload providers, image providers,
# billing rules, signup credits, and default planner/title models are stored
# in SQLite and managed from the admin System Settings page.
#
# Existing config.toml files may still keep the old runtime sections; they are
# used only as first-run seed values when the database has no runtime settings.
